name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: lint
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build:all
      - name: Package artifacts
        run: |
          VERSION=${GITHUB_REF_NAME}
          cd out
          tar -czf ghost-drive-${VERSION}-darwin-arm64.tar.gz darwin-arm64/GhostDrive.app
          tar -czf ghost-drive-${VERSION}-android-arm64.tar.gz android-arm64/GhostDrive.apk
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/ghost-drive-${{ github.ref_name }}-darwin-arm64.tar.gz
            out/ghost-drive-${{ github.ref_name }}-android-arm64.tar.gz
