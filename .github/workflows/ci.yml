name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: holepunchto/actions/bare-base@v1
      - run: npm run lint

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: lint
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: holepunchto/actions/bare-base@v1
      - run: npm run build:all
      - name: Package artifacts
        run: |
          cd out
          tar -czf ghost-drive-${{ github.ref_name }}-darwin-arm64.tar.gz darwin-arm64/GhostDrive.app
          tar -czf ghost-drive-${{ github.ref_name }}-android-arm64.tar.gz android-arm64/GhostDrive.apk
      - run: gh release create ${{ github.ref_name }} ghost-drive-${{ github.ref_name }}-darwin-arm64.tar.gz ghost-drive-${{ github.ref_name }}-android-arm64.tar.gz --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
